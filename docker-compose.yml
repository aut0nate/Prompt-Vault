services:
  prompt-hub:
    container_name: prompt-hub
    build:
      context: .
      args:
        DATABASE_URL: file:/app/data/dev.db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/dev.db
      ATTACHMENTS_DIR: /app/data/prompt-attachments
    volumes:
      - prompt-hub-data:/app/data
    networks:
      - edge-net
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.centurylinklabs.watchtower.enable: "true"

volumes:
  prompt-hub-data:

networks:
  edge-net:
    external: true
